name: Build NeoFreeBird

on:
  workflow_dispatch:
    inputs:
      decrypted_ipa_url:
        description: "Direct URL of the decrypted Twitter/X ipa"
        required: true
        type: string
      sdk_version:
        description: "iOS SDK Version for Theos"
        default: "16.5"
        required: true
        type: string
      target_version:
        description: "Target iOS Version for Theos"
        default: "14.0"
        required: true
        type: string
      repo_commit:
        description: "(Optional) Commit for main repo (patches)"
        default: ""
        required: false
        type: string
      tweak_commit:
        description: "(Optional) Commit for tweak repo"
        default: ""
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-inject:
    name: Build NeoFreeBird
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4.1.1
        with:
          repository: NeoFreeBird/app
          path: main
          ref: ${{ inputs.repo_commit || github.ref }}
          submodules: recursive

      - name: Checkout tweak repo (NeoFreeBird/tweak)
        uses: actions/checkout@v4.1.1
        with:
          repository: NeoFreeBird/tweak
          path: tweak
          ref: ${{ inputs.tweak_commit || 'refs/heads/master' }}
          submodules: recursive

      - name: Hide sensitive inputs
        uses: levibostian/action-hide-sensitive-inputs@v1
        with:
          exclude_inputs: sdk_version,target_version,repo_commit,tweak_commit

      - name: Download and validate IPA
        run: |
          wget "${{ inputs.decrypted_ipa_url }}" --no-verbose -O ${{ github.workspace }}/twitter.ipa

          file_type=$(file --mime-type -b ${{ github.workspace }}/twitter.ipa)

          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::Validation failed: The downloaded file is not a valid IPA. Detected type: $file_type."
            exit 1
          fi

      - name: Install Dependencies
        run: brew install make dpkg ldid

      - name: Set PATH environment variable
        run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Cache Theos
        id: theos
        uses: actions/cache@v4
        env:
          cache-name: theos_cache_67db2ab
        with:
          path: theos/
          key: ${{ env.cache-name }}
          restore-keys: ${{ env.cache-name }}

      - name: Setup Theos
        if: steps.theos.outputs.cache-hit != 'true'
        uses: actions/checkout@v4.1.7
        with:
          repository: theos/theos
          ref: 67db2ab8d950910161730de77c322658ea3e6b44
          path: ${{ github.workspace }}/theos
          submodules: recursive

      - name: Download iOS SDK
        if: steps.theos.outputs.cache-hit != 'true'
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/theos/sdks/
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS${{ inputs.sdk_version }}.sdk
          git checkout
          mv *.sdk $THEOS/sdks
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Install cyan
        run: pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: Extract IPA and apply patches
        run: |
          # Extract IPA to apply patches
          unzip -q ${{ github.workspace }}/twitter.ipa -d ${{ github.workspace }}/tmp
          
          # Extract version
          X_VERSION=$(grep -A 1 '<key>CFBundleShortVersionString</key>' ${{ github.workspace }}/tmp/Payload/Twitter.app/Info.plist |
            grep '<string>' | awk -F'[><]' '{print $3}')
          echo "X_VERSION=${X_VERSION}" >> "$GITHUB_ENV"
          echo "Twitter/X version: $X_VERSION"
          
          # Apply patches to the extracted Twitter.app
          PATCH_SRC="${{ github.workspace }}/main/assets/main"
          if [ -d "${PATCH_SRC}" ]; then
            echo "Applying patches from ${PATCH_SRC}..."
            rsync -av "${PATCH_SRC}/" ${{ github.workspace }}/tmp/Payload/Twitter.app/
          fi
          
          # Repackage the IPA with patches applied
          cd ${{ github.workspace }}/tmp
          zip -qr ${{ github.workspace }}/twitter.ipa Payload
          cd ${{ github.workspace }}

      - name: Build tweak with Theos
        run: |
          cd tweak
          sed -i '' "s/^TARGET.*$/TARGET := iphone:clang:${{ inputs.sdk_version }}:${{ inputs.target_version }}/" Makefile
          make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ${{ github.workspace }}/neofreebird.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Inject tweak into IPA
        run: |
          cyan -i twitter.ipa -o NeoFreeBird_${{ github.run_id }}_${{ env.X_VERSION }}.ipa -uwef neofreebird.deb

      - name: Create TIPA copy
        run: |
          cp NeoFreeBird_${{ github.run_id }}_${{ env.X_VERSION }}.ipa NeoFreeBird_${{ github.run_id }}_${{ env.X_VERSION }}.tipa

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2.0.1
        with:
          tag_name: neofreebird-${{ github.run_number }}
          name: NeoFreeBird v${{ env.X_VERSION }} (${{ github.run_number }})
          files: |
            NeoFreeBird_${{ github.run_id }}_${{ env.X_VERSION }}.ipa
            NeoFreeBird_${{ github.run_id }}_${{ env.X_VERSION }}.tipa
          draft: true

      - name: Output Release URL
        run: |
          echo "::notice::Release available at: https://github.com/${{ github.repository }}/releases"
